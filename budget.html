<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keuangan Ojol - Precision OCR</title>
    <script src='https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js'></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 10px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .content { padding: 15px; }
        .platform-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .platform-box { border: 2px solid #ddd; border-radius: 12px; padding: 15px; background: #fff; }
        .gr { border-color: #00b14f; } .jc { border-color: #00aa13; } .hd { border-color: #ee4d2d; }
        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; }
        .form-group label { font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-group input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-submit { background: #28a745; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 20px; cursor: pointer; }
        
        /* Loading Overlay */
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .progress-container { width: 80%; background: #eee; border-radius: 10px; height: 15px; margin-top: 15px; overflow: hidden; }
        #progressBar { height: 100%; background: #00b14f; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="overlay">
    <h3 id="statusText">Membaca Data...</h3>
    <div class="progress-container"><div id="progressBar"></div></div>
    <p id="detailText">Mohon tunggu...</p>
</div>

<div class="container">
    <div class="header">
        <h1>📊 Laporan Keuangan Ojol</h1>
        <p>Auto-Correction & Multi-OCR Mobile Ready</p>
    </div>

    <div class="content">
        <div class="platform-box" style="margin-bottom: 15px; border-color: #764ba2;">
            <div class="row">
                <div class="form-group"><label>Admin</label><input type="text" id="adminName" placeholder="Nama"></div>
                <div class="form-group"><label>Kode HP</label><input type="text" id="phoneCode" placeholder="Contoh: 1b"></div>
            </div>
        </div>

        <div class="platform-grid">
            <div class="platform-box gr">
                <h4 style="color:#00b14f; margin-bottom:10px;">🟢 GRAB (GR)</h4>
                <div class="row">
                    <div class="form-group"><label>Saldo Awal</label><input type="number" id="grabStart" onchange="calc('grab')"></div>
                    <div class="form-group"><label>Top Up (OCR)</label><input type="number" id="grabTopUp" readonly style="background:#f9f9f9"></div>
                </div>
                <div class="row">
                    <div class="form-group"><label>Total Usage (OCR)</label><input type="number" id="grabUsage" readonly style="background:#f9f9f9"></div>
                    <div class="form-group"><label>Ending</label><input type="number" id="grabEnd" readonly style="background:#d4edda; font-weight:bold;"></div>
                </div>
                <div class="form-group">
                    <label>📸 Bukti Top Up (Auto -2rb):</label>
                    <input type="file" accept="image/*" onchange="runOCR('grab', this, 'topup')">
                </div>
                <div class="form-group">
                    <label>📄 Invoices (Pilih 1 atau lebih):</label>
                    <input type="file" accept="image/*" multiple onchange="runOCR('grab', this, 'usage')">
                </div>
            </div>

            <div class="platform-box jc">
                <h4 style="color:#00aa13; margin-bottom:10px;">🟢 GOFOOD (JC)</h4>
                <div class="row">
                    <div class="form-group"><label>Saldo Awal</label><input type="number" id="jcStart" onchange="calc('jc')"></div>
                    <div class="form-group"><label>Top Up (OCR)</label><input type="number" id="jcTopUp" readonly style="background:#f9f9f9"></div>
                </div>
                <div class="row">
                    <div class="form-group"><label>Total Usage (OCR)</label><input type="number" id="jcUsage" readonly style="background:#f9f9f9"></div>
                    <div class="form-group"><label>Ending</label><input type="number" id="jcEnd" readonly style="background:#d4edda; font-weight:bold;"></div>
                </div>
                <div class="form-group">
                    <label>📸 Bukti Top Up:</label>
                    <input type="file" accept="image/*" onchange="runOCR('jc', this, 'topup')">
                </div>
                <div class="form-group">
                    <label>📄 Invoices (Pilih 1 atau lebih):</label>
                    <input type="file" accept="image/*" multiple onchange="runOCR('jc', this, 'usage')">
                </div>
            </div>

            <div class="platform-box hd">
                <h4 style="color:#ee4d2d; margin-bottom:10px;">🟠 SHOPEE (HD)</h4>
                <div class="row">
                    <div class="form-group"><label>Saldo Awal</label><input type="number" id="hdStart" onchange="calc('hd')"></div>
                    <div class="form-group"><label>Top Up (OCR)</label><input type="number" id="hdTopUp" readonly style="background:#f9f9f9"></div>
                </div>
                <div class="row">
                    <div class="form-group"><label>Total Usage (OCR)</label><input type="number" id="hdUsage" readonly style="background:#f9f9f9"></div>
                    <div class="form-group"><label>Ending</label><input type="number" id="hdEnd" readonly style="background:#d4edda; font-weight:bold;"></div>
                </div>
                <div class="form-group">
                    <label>📸 Bukti Top Up:</label>
                    <input type="file" accept="image/*" onchange="runOCR('hd', this, 'topup')">
                </div>
                <div class="form-group">
                    <label>📄 Invoices (Pilih 1 atau lebih):</label>
                    <input type="file" accept="image/*" multiple onchange="runOCR('hd', this, 'usage')">
                </div>
            </div>
        </div>

        <button class="btn-submit" onclick="alert('Data Siap Dikirim!')">🚀 SUBMIT KE GOOGLE SHEETS</button>
    </div>
</div>

<script>
    // FUNGSI PENTING: Ekstraksi angka nominal akhir (Setelah Diskon/Biaya)
    function extractFinalAmount(text) {
        const lines = text.toLowerCase().split('\n');
        let finalAmount = 0;
        
        // Keywords untuk mencari baris total akhir (Bukan Subtotal)
        const totalKeywords = ['total harga', 'total dibayar', 'total pembayaran', 'dibayar', 'total'];

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            const isTotalLine = totalKeywords.some(key => line.includes(key));
            
            // Abaikan baris yang mengandung 'subtotal' atau 'hemat' agar tidak salah ambil
            if (isTotalLine && !line.includes('sub') && !line.includes('hemat')) {
                // Ambil angka dari baris tersebut atau baris tepat di bawahnya
                const combinedText = line + " " + (lines[i+1] || "");
                const matches = combinedText.replace(/\./g, '').match(/\d{4,}/g);
                if (matches) {
                    // Ambil angka terakhir yang ditemukan di area 'Total' tersebut
                    finalAmount = parseInt(matches[matches.length - 1]);
                    break; 
                }
            }
        }
        
        // Fallback jika keyword tidak ketemu: ambil angka terbesar di bagian bawah gambar
        if (finalAmount === 0) {
            const allMatches = text.replace(/\./g, '').match(/\d{4,}/g);
            if (allMatches) finalAmount = Math.max(...allMatches.map(Number));
        }
        
        return finalAmount;
    }

    async function runOCR(platform, input, mode) {
        const files = input.files;
        if (!files.length) return;

        const overlay = document.getElementById('overlay');
        const progress = document.getElementById('progressBar');
        const detail = document.getElementById('detailText');
        
        overlay.style.display = 'flex';
        let totalBatch = 0;

        for (let i = 0; i < files.length; i++) {
            detail.textContent = `Memproses File ${i+1}/${files.length}...`;
            
            const result = await Tesseract.recognize(files[i], 'ind+eng', {
                logger: m => {
                    if (m.status === 'recognizing text') {
                        const base = (i / files.length) * 100;
                        const step = (m.progress / files.length) * 100;
                        progress.style.width = (base + step) + '%';
                    }
                }
            });

            let amount = extractFinalAmount(result.data.text);
            
            // Konsep Top Up Grab: Potong 2000 otomatis
            if (mode === 'topup' && platform === 'grab' && amount > 0) {
                amount -= 2000;
            }
            
            totalBatch += amount;
        }

        if (mode === 'topup') {
            document.getElementById(platform + 'TopUp').value = totalBatch;
        } else {
            document.getElementById(platform + 'Usage').value = totalBatch;
        }

        calc(platform);
        overlay.style.display = 'none';
        progress.style.width = '0%';
    }

    function calc(platform) {
        const s = parseInt(document.getElementById(platform + 'Start').value) || 0;
        const t = parseInt(document.getElementById(platform + 'TopUp').value) || 0;
        const u = parseInt(document.getElementById(platform + 'Usage').value) || 0;
        
        // Rumus: Saldo Akhir = Saldo Awal + TopUp (setelah dipotong) - Total Usage (Bersih)
        document.getElementById(platform + 'End').value = (s + t) - u;
    }
</script>
</body>
</html>
