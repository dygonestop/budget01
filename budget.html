<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ojol Smart Report</title>
    <script src='https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js'></script>
    <style>
        :root { --grab: #00B14F; --jc: #EE2737; --hd: #EE4D2D; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; position: relative; }
        .card.grab { border-top: 5px solid var(--grab); }
        .card.jc { border-top: 5px solid var(--jc); }
        .card.hd { border-top: 5px solid var(--hd); }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .ocr-preview { font-size: 12px; color: #666; background: #eee; padding: 5px; border-radius: 3px; margin-top: 5px; }
        .status-valid { color: green; font-weight: bold; }
        .status-invalid { color: red; font-weight: bold; }
        button { width: 100%; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); color:white; justify-content:center; align-items:center; z-index:1000; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">Mohon Tunggu... Sedang Memproses Data...</div>

<div class="container">
    <h2 style="text-align: center;">Laporan Keuangan Ojol</h2>
    
    <div class="card" style="margin-bottom: 20px;">
        <div class="grid">
            <div>
                <label>Nama Admin</label>
                <input type="text" id="admin" placeholder="Nama Anda">
            </div>
            <div>
                <label>Tanggal</label>
                <input type="date" id="date">
            </div>
            <div>
                <label>Kode HP</label>
                <input type="text" id="phoneCode" placeholder="Contoh: 1b" onblur="fetchLastBalance()">
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="card grab">
            <h4>GRAB</h4>
            <input type="number" id="grabStart" placeholder="Saldo Awal" oninput="validateCalc('grab')">
            <input type="number" id="grabUsage" placeholder="Usage (Manual)" oninput="validateCalc('grab')">
            <label>Upload Screenshot Ending Balance:</label>
            <input type="file" id="fileGrab" accept="image/*" onchange="processOCR(this, 'grab')">
            <div id="ocrGrab" class="ocr-preview">OCR: Menunggu gambar...</div>
            <div id="valGrab" class="status-invalid">Status: Belum Valid</div>
            <input type="hidden" id="grabEndOCR">
        </div>

        <div class="card jc">
            <h4>JC (GOFOOD)</h4>
            <input type="number" id="jcStart" placeholder="Saldo Awal" oninput="validateCalc('jc')">
            <input type="number" id="jcUsage" placeholder="Usage (Manual)" oninput="validateCalc('jc')">
            <label>Upload Screenshot Ending Balance:</label>
            <input type="file" id="fileJc" accept="image/*" onchange="processOCR(this, 'jc')">
            <div id="ocrJc" class="ocr-preview">OCR: Menunggu gambar...</div>
            <div id="valJc" class="status-invalid">Status: Belum Valid</div>
            <input type="hidden" id="jcEndOCR">
        </div>

        <div class="card hd">
            <h4>HD (SHOPEE)</h4>
            <input type="number" id="hdStart" placeholder="Saldo Awal" oninput="validateCalc('hd')">
            <input type="number" id="hdUsage" placeholder="Usage (Manual)" oninput="validateCalc('hd')">
            <label>Upload Screenshot Ending Balance:</label>
            <input type="file" id="fileHd" accept="image/*" onchange="processOCR(this, 'hd')">
            <div id="ocrHd" class="ocr-preview">OCR: Menunggu gambar...</div>
            <div id="valHd" class="status-invalid">Status: Belum Valid</div>
            <input type="hidden" id="hdEndOCR">
        </div>
    </div>

    <textarea id="remarks" placeholder="Catatan Tambahan (Opsional)" rows="3"></textarea>
    <button id="btnSubmit" disabled onclick="submitData()">KIRIM LAPORAN</button>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxUx-5JZEpRVJrf5G22zWFdXS85t-YZBac1GH5zbAIfczPR-ltLpxQ20Th5PReV9oQ2/exec';
    let fileStore = {};

    // 1. Ambil Saldo Terakhir Otomatis
    async function fetchLastBalance() {
        const rawCode = document.getElementById('phoneCode').value;
        if(!rawCode) return;
        
        const cleanCode = rawCode.toLowerCase().replace(/\s+/g, '');
        document.getElementById('phoneCode').value = cleanCode; // Normalisasi tampilan

        try {
            const resp = await fetch(`${SCRIPT_URL}?action=getLastBalance&phoneCode=${cleanCode}`);
            const res = await resp.json();
            
            document.getElementById('grabStart').value = res.grabEnd || 0;
            document.getElementById('jcStart').value = res.jcEnd || 0;
            document.getElementById('hdStart').value = res.hdEnd || 0;
            
            validateCalc('grab'); validateCalc('jc'); validateCalc('hd');
        } catch(e) { console.log("New Phone Code"); }
    }

    // 2. OCR dengan Validasi Ketat
    async function processOCR(input, platform) {
        if (!input.files[0]) return;
        const display = document.getElementById(`ocr${platform.charAt(0).toUpperCase() + platform.slice(1)}`);
        const statusDiv = document.getElementById(`val${platform.charAt(0).toUpperCase() + platform.slice(1)}`);
        
        display.innerText = "Processing OCR...";
        
        const reader = new FileReader();
        reader.onload = async () => {
            const base64 = reader.result;
            fileStore[`ss${platform.charAt(0).toUpperCase() + platform.slice(1)}`] = {
                data: base64,
                name: input.files[0].name,
                type: input.files[0].type
            };

            const result = await Tesseract.recognize(base64, 'eng');
            const text = result.data.text;
            
            // Ekstrak angka paling besar/terakhir (biasanya saldo)
            const numbers = text.replace(/[,.]/g, '').match(/\d+/g);
            if (numbers) {
                const detected = Math.max(...numbers.map(Number));
                display.innerText = `OCR Detected: Rp ${detected.toLocaleString()}`;
                document.getElementById(`${platform}EndOCR`).value = detected;
                validateCalc(platform);
            } else {
                display.innerText = "OCR Gagal membaca angka.";
            }
        };
        reader.readAsDataURL(input.files[0]);
    }

    // 3. Validasi: Saldo Awal - Usage === OCR Ending Balance
    function validateCalc(platform) {
        const start = parseInt(document.getElementById(`${platform}Start`).value) || 0;
        const usage = parseInt(document.getElementById(`${platform}Usage`).value) || 0;
        const ocrEnd = parseInt(document.getElementById(`${platform}EndOCR`).value) || 0;
        
        const statusDiv = document.getElementById(`val${platform.charAt(0).toUpperCase() + platform.slice(1)}`);
        const expectedEnd = start - usage;

        if (ocrEnd > 0 && expectedEnd === ocrEnd) {
            statusDiv.innerText = "Status: VALID (Sesuai)";
            statusDiv.className = "status-valid";
        } else {
            statusDiv.innerText = `Status: TIDAK VALID (Selisih ${expectedEnd - ocrEnd})`;
            statusDiv.className = "status-invalid";
        }
        
        checkGlobalValidity();
    }

    function checkGlobalValidity() {
        const vGr = document.getElementById('valGrab').className === "status-valid";
        const vJc = document.getElementById('valJc').className === "status-valid";
        const vHd = document.getElementById('valHd').className === "status-valid";
        const admin = document.getElementById('admin').value;
        
        document.getElementById('btnSubmit').disabled = !(vGr && vJc && vHd && admin);
    }

    // 4. Kirim Data
    async function submitData() {
        document.getElementById('loader').style.display = 'flex';
        
        const payload = {
            admin: document.getElementById('admin').value,
            date: document.getElementById('date').value,
            phoneCode: document.getElementById('phoneCode').value,
            grabStart: document.getElementById('grabStart').value,
            grabUsage: document.getElementById('grabUsage').value,
            grabEnd: document.getElementById('grabEndOCR').value,
            jcStart: document.getElementById('jcStart').value,
            jcUsage: document.getElementById('jcUsage').value,
            jcEnd: document.getElementById('jcEndOCR').value,
            hdStart: document.getElementById('hdStart').value,
            hdUsage: document.getElementById('hdUsage').value,
            hdEnd: document.getElementById('hdEndOCR').value,
            remarks: document.getElementById('remarks').value,
            files: fileStore
        };

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if(result.success) {
                alert("Data Berhasil Disinkronkan ke Sheet!");
                location.reload();
            } else {
                alert("Error: " + result.error);
            }
        } catch (e) {
            alert("Terjadi kesalahan jaringan.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }
    
    // Set default date today
    document.getElementById('date').valueAsDate = new Date();
</script>

</body>
</html>
