<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keuangan Ojek Online - AUTO-CALC</title>
    <script src='https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js'></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            margin: 3px;
        }
        .badge.gr { background: #00b14f; color: white; }
        .badge.jc { background: #00aa13; color: white; }
        .badge.hd { background: #ee4d2d; color: white; }
        .content { padding: 15px; }
        .form-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        .form-group label {
            font-size: 10px;
            font-weight: 600;
            color: #555;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .form-group input, .form-group select {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
        }
        .balance-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        .platform-box {
            background: white;
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .platform-box.gr { border-color: #00b14f; }
        .platform-box.jc { border-color: #00aa13; }
        .platform-box.hd { border-color: #ee4d2d; }
        .platform-header { font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .balance-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .file-upload-row {
            background: #f1f3f5;
            padding: 8px;
            border-radius: 6px;
            margin-top: 5px;
        }
        .detected-box {
            background: #28a745;
            color: white;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }
        .detected-box.active { display: block; }
        .progress-box {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .progress-box.active { display: block; }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: #764ba2; width: 0%; transition: width 0.2s; }
        .btn-success {
            background: #28a745;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
        }
        .hidden { display: none; }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>
    <div class="progress-box" id="progressBox">
        <strong id="progressText">Memproses OCR...</strong>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <small id="progressDetail">Mohon tunggu...</small>
    </div>

    <div class="container">
        <div class="header">
            <h1>📊 Laporan Keuangan Ojol</h1>
            <p>Auto-OCR Top Up & Multi-Invoice</p>
        </div>

        <div class="content">
            <div id="setupGuide" class="form-section">
                <input type="text" id="appsScriptUrl" style="width:100%; padding:10px;" placeholder="Paste URL Apps Script di sini..." value="https://script.google.com/macros/s/AKfycbx9Gh_kwZLRm2CEBJLqsNtDfwlVVX7-KDCeL1xhn3HZHnpMGjwY8Wbpjj2l2scdoVrU/exec">
                <button class="btn-success" onclick="saveConfig()" style="margin-top:10px; padding:10px;">💾 Aktifkan Sistem</button>
            </div>

            <div id="mainForm" class="hidden">
                <div class="form-section">
                    <div class="section-title">👤 Data Admin</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Admin</label>
                            <input type="text" id="adminName" placeholder="Nama">
                        </div>
                        <div class="form-group">
                            <label>HP</label>
                            <select id="phoneCode">
                                <option value="1b">1b</option><option value="2b">2b</option><option value="3b">3b</option><option value="4b">4b</option><option value="5b">5b</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Tanggal</label>
                            <input type="date" id="transDate">
                        </div>
                    </div>
                </div>

                <div class="balance-section">
                    <div class="platform-box gr">
                        <div class="platform-header" style="color:#00b14f">🟢 GRAB</div>
                        <div class="balance-row">
                            <div class="form-group">
                                <label>Saldo Awal</label>
                                <input type="number" id="grabStart" placeholder="0" onchange="calcEnding('grab')">
                            </div>
                            <div class="form-group">
                                <label>Top Up (OCR)</label>
                                <input type="number" id="grabTopUp" placeholder="Otomatis" readonly style="background:#f1f3f5">
                            </div>
                        </div>
                        <div class="balance-row">
                            <div class="form-group">
                                <label>Total Usage</label>
                                <input type="number" id="grabUsage" placeholder="Otomatis" readonly style="background:#f1f3f5">
                            </div>
                            <div class="form-group">
                                <label>Ending</label>
                                <input type="number" id="grabEnd" readonly style="background:#d4edda; font-weight:bold">
                            </div>
                        </div>
                        <div class="file-upload-row">
                            <label style="font-size:10px">📸 Bukti Top Up:</label>
                            <input type="file" accept="image/*" onchange="processOCR('grab', this, 'topup')">
                        </div>
                        <div class="file-upload-row">
                            <label style="font-size:10px">📄 Invoices (Multi):</label>
                            <input type="file" accept="image/*" multiple onchange="processOCR('grab', this, 'usage')">
                        </div>
                    </div>

                    <div class="platform-box jc">
                        <div class="platform-header" style="color:#00aa13">🟢 GOFOOD</div>
                        <div class="balance-row">
                            <div class="form-group">
                                <label>Saldo Awal</label>
                                <input type="number" id="jcStart" placeholder="0" onchange="calcEnding('jc')">
                            </div>
                            <div class="form-group">
                                <label>Top Up (OCR)</label>
                                <input type="number" id="jcTopUp" placeholder="Otomatis" readonly style="background:#f1f3f5">
                            </div>
                        </div>
                        <div class="balance-row">
                            <div class="form-group">
                                <label>Total Usage</label>
                                <input type="number" id="jcUsage" placeholder="Otomatis" readonly style="background:#f1f3f5">
                            </div>
                            <div class="form-group">
                                <label>Ending</label>
                                <input type="number" id="jcEnd" readonly style="background:#d4edda; font-weight:bold">
                            </div>
                        </div>
                        <div class="file-upload-row">
                            <label style="font-size:10px">📸 Bukti Top Up:</label>
                            <input type="file" accept="image/*" onchange="processOCR('jc', this, 'topup')">
                        </div>
                        <div class="file-upload-row">
                            <label style="font-size:10px">📄 Invoices (Multi):</label>
                            <input type="file" accept="image/*" multiple onchange="processOCR('jc', this, 'usage')">
                        </div>
                    </div>

                    <div class="platform-box hd">
                        <div class="platform-header" style="color:#ee4d2d">🟠 SHOPEE</div>
                        <div class="balance-row">
                            <div class="form-group">
                                <label>Saldo Awal</label>
                                <input type="number" id="hdStart" placeholder="0" onchange="calcEnding('hd')">
                            </div>
                            <div class="form-group">
                                <label>Top Up (OCR)</label>
                                <input type="number" id="hdTopUp" placeholder="Otomatis" readonly style="background:#f1f3f5">
                            </div>
                        </div>
                        <div class="balance-row">
                            <div class="form-group">
                                <label>Total Usage</label>
                                <input type="number" id="hdUsage" placeholder="Otomatis" readonly style="background:#f1f3f5">
                            </div>
                            <div class="form-group">
                                <label>Ending</label>
                                <input type="number" id="hdEnd" readonly style="background:#d4edda; font-weight:bold">
                            </div>
                        </div>
                        <div class="file-upload-row">
                            <label style="font-size:10px">📸 Bukti Top Up:</label>
                            <input type="file" accept="image/*" onchange="processOCR('hd', this, 'topup')">
                        </div>
                        <div class="file-upload-row">
                            <label style="font-size:10px">📄 Invoices (Multi):</label>
                            <input type="file" accept="image/*" multiple onchange="processOCR('hd', this, 'usage')">
                        </div>
                    </div>
                </div>

                <button class="btn-success" onclick="submitAll()">🚀 SUBMIT DATA</button>
            </div>
        </div>
    </div>

    <script>
        let APPS_SCRIPT_URL = localStorage.getItem('ojol_apps_script_url') || '';
        document.getElementById('transDate').valueAsDate = new Date();

        if (APPS_SCRIPT_URL) {
            document.getElementById('setupGuide').classList.add('hidden');
            document.getElementById('mainForm').classList.remove('hidden');
        }

        function saveConfig() {
            const url = document.getElementById('appsScriptUrl').value.trim();
            if (url) {
                localStorage.setItem('ojol_apps_script_url', url);
                location.reload();
            }
        }

        function extractAmount(text) {
            const cleanText = text.replace(/\./g, '');
            const matches = cleanText.match(/\d{4,}/g);
            if (matches) {
                return Math.max(...matches.map(Number));
            }
            return 0;
        }

        async function processOCR(platform, input, mode) {
            const files = input.files;
            if (!files.length) return;

            const overlay = document.getElementById('overlay');
            const progressBox = document.getElementById('progressBox');
            const fill = document.getElementById('progressFill');
            const detail = document.getElementById('progressDetail');

            overlay.classList.add('active');
            progressBox.classList.add('active');
            
            let totalDetected = 0;

            for (let i = 0; i < files.length; i++) {
                detail.textContent = `Memproses File ${i+1} dari ${files.length}...`;
                
                try {
                    const result = await Tesseract.recognize(files[i], 'ind+eng', {
                        logger: m => {
                            if (m.status === 'recognizing text') {
                                const base = (i / files.length) * 100;
                                const current = (m.progress / files.length) * 100;
                                fill.style.width = (base + current) + '%';
                            }
                        }
                    });

                    let amount = extractAmount(result.data.text);
                    
                    // Logika Khusus Top Up Grab
                    if (mode === 'topup' && platform === 'grab' && amount > 0) {
                        amount -= 2000;
                    }
                    
                    totalDetected += amount;
                } catch (e) {
                    console.error(e);
                }
            }

            if (mode === 'topup') {
                document.getElementById(platform + 'TopUp').value = totalDetected;
            } else {
                document.getElementById(platform + 'Usage').value = totalDetected;
            }

            calcEnding(platform);
            
            overlay.classList.remove('active');
            progressBox.classList.remove('active');
            fill.style.width = '0%';
        }

        function calcEnding(platform) {
            const start = parseInt(document.getElementById(platform + 'Start').value) || 0;
            const topup = parseInt(document.getElementById(platform + 'TopUp').value) || 0;
            const usage = parseInt(document.getElementById(platform + 'Usage').value) || 0;
            
            const end = (start + topup) - usage;
            document.getElementById(platform + 'End').value = Math.max(0, end);
        }

        async function submitAll() {
            // Logika submit Anda ke Apps Script
            alert("Data siap dikirim ke Google Sheets!");
            // Tambahkan fetch POST ke APPS_SCRIPT_URL di sini seperti kode awal Anda
        }
    </script>
</body>
</html>
