<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; background: #f0f2f5; padding: 15px; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    .input-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
    input[type="file"] { font-size: 11px; }
    button { width: 100%; padding: 12px; background: #0084ff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    #status { text-align: center; margin-top: 10px; font-size: 13px; }
  </style>
</head>
<body>

<div class="card">
  <h3>Upload Nota (Otomatis)</h3>
  <div class="input-group">
    <label>Kode HP</label>
    <input type="text" id="hpCode" value="1b">
  </div>

  <div class="input-group">
    <label>1. Nota Grab & Saldo OVO</label>
    <input type="file" id="imgGrab" accept="image/*">
    <input type="file" id="imgGrabBal" accept="image/*">
  </div>

  <div class="input-group">
    <label>2. Nota JC & Saldo GoPay</label>
    <input type="file" id="imgJC" accept="image/*">
    <input type="file" id="imgJCBal" accept="image/*">
  </div>

  <div class="input-group">
    <label>3. Nota HD & Saldo SPay</label>
    <input type="file" id="imgHD" accept="image/*">
    <input type="file" id="imgHDBal" accept="image/*">
  </div>

  <div class="input-group">
    <label>4. Nota Tambahan (Bensin/Lainnya)</label>
    <input type="file" id="imgExtra" accept="image/*">
    <select id="targetExtra">
      <option value="None">-- Tambah Ke Mana? --</option>
      <option value="Grab">Grab</option>
      <option value="JC">JC</option>
      <option value="HD">HD</option>
    </select>
  </div>

  <button onclick="uploadSemua()">KIRIM LAPORAN</button>
  <div id="status"></div>
</div>

<script>
  async function toBase64(file) {
    if (!file) return null;
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve({data: reader.result, type: file.type});
      reader.onerror = error => reject(error);
    });
  }

  async function uploadSemua() {
    const btn = document.querySelector('button');
    const status = document.getElementById('status');
    btn.disabled = true;
    status.innerText = "Sedang Membaca Gambar (OCR)...";

    const data = {
      hpCode: document.getElementById('hpCode').value,
      targetExtra: document.getElementById('targetExtra').value,
      imgGrab: await toBase64(document.getElementById('imgGrab').files[0]),
      imgGrabBal: await toBase64(document.getElementById('imgGrabBal').files[0]),
      imgJC: await toBase64(document.getElementById('imgJC').files[0]),
      imgJCBal: await toBase64(document.getElementById('imgJCBal').files[0]),
      imgHD: await toBase64(document.getElementById('imgHD').files[0]),
      imgHDBal: await toBase64(document.getElementById('imgHDBal').files[0]),
      imgExtra: await toBase64(document.getElementById('imgExtra').files[0])
    };

    google.script.run.withSuccessHandler(res => {
      status.innerText = res;
      btn.disabled = false;
    }).processAll(data);
  }
</script>

</body>
</html>
