<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ojol Report</title>

<!-- OCR ENGINE (WAJIB) -->
<script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
input { width:100%; padding:8px; margin:5px 0; }
button { padding:10px; width:100%; background:#2ecc71; color:white; border:none; }
.validation-box { padding:10px; margin-top:10px; border-radius:5px; }
.success { background:#d4edda; }
.error { background:#f8d7da; }
</style>
</head>

<body>

<h2>OJOL REPORT</h2>

<div class="card">
    <input id="adminName" placeholder="Nama Admin">
    <input id="phoneCode" placeholder="Kode HP (1b dll)" oninput="fetchSaldo()">
    <input id="transDate" type="date">
</div>

<!-- GRAB -->
<div class="card">
<h3>GRAB</h3>

<input id="grabStart" readonly placeholder="Saldo Awal">
<input id="grabTopUp" placeholder="Topup" oninput="calc('grab')">
<input id="grabUsage" placeholder="Usage" oninput="calc('grab')">
<input id="grabEnd" readonly placeholder="Ending">

<p>Upload Invoice:</p>
<input type="file" multiple id="grabInvoice">

<p>Upload Ending:</p>
<input type="file" id="grabEnding">

<div id="grabOCRResult"></div>
<div id="grabValidation" class="validation-box"></div>
</div>

<!-- JC -->
<div class="card">
<h3>JC</h3>

<input id="jcStart" readonly>
<input id="jcTopUp" oninput="calc('jc')">
<input id="jcUsage" oninput="calc('jc')">
<input id="jcEnd" readonly>

<input type="file" multiple id="jcInvoice">
<input type="file" id="jcEnding">

<div id="jcOCRResult"></div>
<div id="jcValidation" class="validation-box"></div>
</div>

<!-- HD -->
<div class="card">
<h3>HD</h3>

<input id="hdStart" readonly>
<input id="hdTopUp" oninput="calc('hd')">
<input id="hdUsage" oninput="calc('hd')">
<input id="hdEnd" readonly>

<input type="file" multiple id="hdInvoice">
<input type="file" id="hdEnding">

<div id="hdOCRResult"></div>
<div id="hdValidation" class="validation-box"></div>
</div>

<button onclick="submitAll()">SUBMIT</button>

<script>
// ================= CONFIG =================
const API = "https://script.google.com/macros/s/AKfycby0hLj9Z9n63OdTlD-1fWWkg6ArfEi_GnPSFHxxi39bLCgpHGazL7CaBSem29rlFzq0/exec"; 

// ================= STATE =================
let lastSaldo = {grab:0,jc:0,hd:0};
let ocrEnding = {grab:null,jc:null,hd:null};

// ================= NORMALIZE =================
function normalize(code){
 return code.toLowerCase().replace(/\s+/g,'').replace(/[^a-z0-9]/g,'').replace(/(.)\1+/g,'$1');
}

// ================= FETCH =================
async function fetchSaldo(){
 const code = normalize(phoneCode.value);
 if(!code) return;

 const res = await fetch(API+"?action=getLastBalance&phoneCode="+code);
 const json = await res.json();

 lastSaldo.grab = json.grabEnd || 0;
 lastSaldo.jc = json.jcEnd || 0;
 lastSaldo.hd = json.hdEnd || 0;

 calcAll();
}

// ================= CALC =================
function calc(p){
 let start = (lastSaldo[p]||0) + (parseInt(document.getElementById(p+'TopUp').value)||0);
 let usage = parseInt(document.getElementById(p+'Usage').value)||0;
 let end = start - usage;

 document.getElementById(p+'Start').value = start;
 document.getElementById(p+'End').value = end;

 validate(p);
}
function calcAll(){ ['grab','jc','hd'].forEach(calc); }

// ================= OCR =================
async function readOCR(file){
 const { data } = await Tesseract.recognize(file,'eng');
 let nums = data.text.match(/\d[\d.,]*/g);
 if(!nums) return 0;
 return Math.max(...nums.map(x=>parseInt(x.replace(/[.,]/g,''))||0));
}

// ================= EVENT BIND =================
['grab','jc','hd'].forEach(p=>{

 // INVOICE
 document.getElementById(p+'Invoice').addEventListener('change', async function(){
   let total=0;
   for(let f of this.files){
     total += await readOCR(f);
   }
   document.getElementById(p+'Usage').value = total;
   calc(p);
 });

 // ENDING
 document.getElementById(p+'Ending').addEventListener('change', async function(){
   let val = await readOCR(this.files[0]);
   ocrEnding[p]=val;

   document.getElementById(p+'OCRResult').innerHTML = "OCR: "+val;
   validate(p);
 });

});

// ================= VALIDASI =================
function validate(p){
 let calcEnd = parseInt(document.getElementById(p+'End').value)||0;
 let ocr = ocrEnding[p];

 let box = document.getElementById(p+'Validation');

 if(ocr===null){
   box.className='validation-box error';
   box.innerHTML='OCR belum ada';
   return false;
 }

 if(calcEnd!==ocr){
   box.className='validation-box error';
   box.innerHTML='TIDAK MATCH';
   return false;
 }

 box.className='validation-box success';
 box.innerHTML='VALID';
 return true;
}

// ================= SUBMIT =================
async function submitAll(){
 for(let p of ['grab','jc','hd']){
   if(!validate(p)){ alert("Data tidak valid"); return;}
 }

 let data = {
   admin: adminName.value,
   phoneCode: normalize(phoneCode.value),
   date: transDate.value,

   grabStart: grabStart.value,
   grabUsage: grabUsage.value,
   grabEnd: grabEnd.value,

   jcStart: jcStart.value,
   jcUsage: jcUsage.value,
   jcEnd: jcEnd.value,

   hdStart: hdStart.value,
   hdUsage: hdUsage.value,
   hdEnd: hdEnd.value
 };

 let res = await fetch(API,{
   method:"POST",
   body:JSON.stringify(data)
 });

 let json = await res.json();
 alert(json.success ? "BERHASIL" : "GAGAL");
 location.reload();
}
</script>

</body>
</html>
